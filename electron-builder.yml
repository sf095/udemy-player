appId: com.udemyplayer.offline
productName: Udemy Offline Player
directories:
  output: dist-desktop
files:
  - electron/**/*
  - backend/**/*
  - "!backend/progress_db.json"
  - frontend/dist/**/*
  - package.json
mac:
  category: public.app-category.education
  target:
    - target: dmg
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
  icon: build/icon.ico
